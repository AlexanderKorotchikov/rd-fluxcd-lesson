apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wordpress-db
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./clusters/my-cluster/wordpress-db
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: wordpress-operator
  timeout: 10m